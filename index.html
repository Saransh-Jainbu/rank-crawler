<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIT Rankings Browser - Gender Neutral (All Rounds)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .search-section {
            padding: 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }
        
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .suggestion-item:hover {
            background: #f0f0f0;
        }
        
        .suggestion-item.selected {
            background: #667eea;
            color: white;
        }
        
        .content {
            padding: 40px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            display: none;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }
        
        .results {
            display: none;
        }
        
        .branch-section {
            margin-bottom: 40px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .branch-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .branch-content {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }
        
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e9ecef;
            white-space: nowrap;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .rank {
            font-weight: 600;
            color: #667eea;
        }
        
        .round-header {
            background: #e9ecef;
            font-weight: bold;
            color: #333;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .no-results h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 4px;
            color: #333;
        }
        
        .quota-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-right: 5px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 IIT Rankings Browser</h1>
            <p>Gender-Neutral Seats • All 6 Counseling Rounds</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Search IIT (e.g., 'Mumbai', 'Delhi', 'Bombay')..."
                    autocomplete="off"
                >
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>
        
        <div class="content">
            <div class="loading" id="loading" style="display: none;">Loading data...</div>
            <div class="stats" id="stats"></div>
            <div class="results" id="results"></div>
            <div class="no-results" id="noResults" style="display: none;">
                <h2>📍 No Results Found</h2>
                <p>Try searching for an IIT name like 'Mumbai', 'Delhi', 'Bombay', 'Kanpur', etc.</p>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let iitList = [];
        
        // Load JSON data
        async function loadData() {
            try {
                document.getElementById('loading').style.display = 'block';
                
                // Load the JSON file
                const response = await fetch('iit_rankings_gender_neutral_20260522_100203.json');
                allData = await response.json();
                
                // Extract unique IITs
                iitList = [...new Set(allData.map(d => d.Institute))].sort();
                
                document.getElementById('loading').style.display = 'none';
                console.log(`Loaded ${allData.length} records from ${iitList.length} IITs`);
            } catch (error) {
                document.getElementById('loading').innerHTML = 
                    '<h2>Error Loading Data</h2><p>Make sure the JSON file is in the same directory.</p>';
                console.error('Error loading data:', error);
            }
        }
        
        // Group data by IIT and Branch
        function groupDataByBranch(iit) {
            const iitData = allData.filter(d => d.Institute === iit);
            const grouped = {};
            
            iitData.forEach(row => {
                const branch = row['Academic Program Name'];
                if (!grouped[branch]) {
                    grouped[branch] = [];
                }
                grouped[branch].push(row);
            });
            
            return grouped;
        }
        
        // Create table for a branch
        function createBranchTable(branch, rows) {
            // Sort rows by round
            rows.sort((a, b) => parseInt(a.Round) - parseInt(b.Round));
            
            let html = `
                <div class="branch-section">
                    <div class="branch-title">🔧 ${branch}</div>
                    <div class="branch-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>Round</th>
                                    <th>Quota</th>
                                    <th>Seat Type</th>
                                    <th>Opening Rank</th>
                                    <th>Closing Rank</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            rows.forEach(row => {
                const openRank = row['Opening Rank'] === '-' ? '—' : row['Opening Rank'];
                const closeRank = row['Closing Rank'] === '-' ? '—' : row['Closing Rank'];
                
                html += `
                    <tr>
                        <td class="round-header">Round ${row.Round}</td>
                        <td><span class="quota-badge">${row.Quota}</span></td>
                        <td>${row['Seat Type']}</td>
                        <td class="rank">${openRank}</td>
                        <td class="rank">${closeRank}</td>
                    </tr>
                `;
            });
            
            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            return html;
        }
        
        // Display results
        function displayResults(iit) {
            const grouped = groupDataByBranch(iit);
            const branches = Object.keys(grouped).sort();
            
            if (branches.length === 0) {
                document.getElementById('results').style.display = 'none';
                document.getElementById('stats').style.display = 'none';
                document.getElementById('noResults').style.display = 'block';
                return;
            }
            
            // Show stats
            const totalRecords = Object.values(grouped)
                .reduce((sum, arr) => sum + arr.length, 0);
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Institute</div>
                    <div class="stat-value" style="font-size: 1.3em; word-break: break-word;">${iit}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Branches</div>
                    <div class="stat-value">${branches.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Entries</div>
                    <div class="stat-value">${totalRecords}</div>
                </div>
            `;
            
            // Show results
            let html = '';
            branches.forEach(branch => {
                html += createBranchTable(branch, grouped[branch]);
            });
            
            html += `
                <div class="info-box">
                    <strong>ℹ️ Note:</strong> All data shown is for Gender-Neutral seats across all 6 counseling rounds. 
                    Opening Rank = First candidate allocated | Closing Rank = Last candidate allocated
                </div>
            `;
            
            document.getElementById('results').innerHTML = html;
            document.getElementById('results').style.display = 'block';
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('noResults').style.display = 'none';
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            const suggestionsDiv = document.getElementById('suggestions');
            
            if (!query) {
                suggestionsDiv.style.display = 'none';
                document.getElementById('results').style.display = 'none';
                document.getElementById('stats').style.display = 'none';
                document.getElementById('noResults').style.display = 'none';
                return;
            }
            
            // Filter suggestions
            const filtered = iitList.filter(iit => 
                iit.toLowerCase().includes(query)
            ).slice(0, 10);
            
            if (filtered.length > 0) {
                suggestionsDiv.innerHTML = filtered
                    .map(iit => `<div class="suggestion-item" data-iit="${iit}">${iit}</div>`)
                    .join('');
                suggestionsDiv.style.display = 'block';
                
                // Add click handlers
                document.querySelectorAll('.suggestion-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const selected = this.getAttribute('data-iit');
                        document.getElementById('searchInput').value = selected;
                        suggestionsDiv.style.display = 'none';
                        displayResults(selected);
                    });
                });
            } else {
                suggestionsDiv.style.display = 'none';
            }
        });
        
        // Close suggestions on escape
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('suggestions').style.display = 'none';
            }
        });
        
        // Close suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                document.getElementById('suggestions').style.display = 'none';
            }
        });
        
        // Initialize
        loadData();
    </script>
</body>
</html>
